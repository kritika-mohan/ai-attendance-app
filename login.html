<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – SMARTCURRICULUM</title>
  <meta name="description" content="Sign in or create your SMARTCURRICULUM account." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-animated"></div>

  <!-- Loading overlay -->
  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="loader"></div>
    <p class="loading-text" id="loading-text">Signing you in…</p>
  </div>

  <!-- Navbar minimal -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">S</div>
      <span class="navbar-title">SMARTCURRICULUM</span>
    </a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">S</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Sign in to continue to your dashboard</p>

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login"    role="tab" aria-selected="true"  onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" role="tab" aria-selected="false" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- ── Login Form ──────────────────────────── -->
      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input"
                 placeholder="you@university.edu" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input"
                 placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          Sign In →
        </button>
      </form>

      <!-- ── Register Form ───────────────────────── -->
      <form class="auth-form hidden" id="register-form" novalidate>
        <div class="form-group">
          <label for="reg-name" class="form-label">Full Name</label>
          <input type="text" id="reg-name" class="form-input"
                 placeholder="Jane Doe" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="reg-email" class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-input"
                 placeholder="you@university.edu" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-password" class="form-label">Password</label>
          <input type="password" id="reg-password" class="form-input"
                 placeholder="Min. 6 characters" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="reg-role" class="form-label">Role</label>
          <select id="reg-role" class="form-select form-input" required>
            <option value="">Select your role…</option>
            <option value="student">🎓 Student</option>
            <option value="teacher">👩‍🏫 Teacher</option>
          </select>
        </div>
        <div class="form-group">
          <label for="reg-course" class="form-label">Course / Department</label>
          <input type="text" id="reg-course" class="form-input"
                 placeholder="e.g. Computer Science" required />
        </div>
        <div id="register-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn">
          Create Account →
        </button>
      </form>
    </div>
  </div>

  <!-- ── CDN Libraries ────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>

  <script type="module">
    import { loginUser, registerUser }  from './js/auth.js';
    import { initThemeToggle, showToast, setLoading } from './js/utils.js';

    initThemeToggle('theme-toggle');

    // ── Tab switching ──
    window.switchTab = function(tab) {
      const loginForm    = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const tabLogin     = document.getElementById('tab-login');
      const tabRegister  = document.getElementById('tab-register');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
      }
      clearErrors();
    };

    function clearErrors() {
      ['login-error', 'register-error'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.display = 'none'; el.textContent = ''; }
      });
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.style.display = 'block'; }
    }

    function setBtnLoading(btnId, loading, label) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span> Please wait…' : label;
    }

    // ── Login Submit ──
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showError('login-error', 'Please fill in all fields.');
        return;
      }

      setBtnLoading('login-btn', true, 'Sign In →');
      setLoading(true, 'Signing you in…');

      try {
        await loginUser(email, password);
        // Redirect happens inside loginUser()
      } catch (err) {
        setLoading(false);
        setBtnLoading('login-btn', false, 'Sign In →');
        showError('login-error', err.message);
      }
    });

    // ── Register Submit ──
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const role     = document.getElementById('reg-role').value;
      const course   = document.getElementById('reg-course').value.trim();

      if (!name || !email || !password || !role || !course) {
        showError('register-error', 'Please fill in all fields.');
        return;
      }
      if (password.length < 6) {
        showError('register-error', 'Password must be at least 6 characters.');
        return;
      }

      setBtnLoading('register-btn', true, 'Create Account →');
      setLoading(true, 'Creating your account…');

      try {
        await registerUser({ name, email, password, role, course });
        setLoading(false);
        setBtnLoading('register-btn', false, 'Create Account →');
        showToast('success', 'Account created! Check your email to confirm, then sign in.');
        window.switchTab('login');
      } catch (err) {
        setLoading(false);
        setBtnLoading('register-btn', false, 'Create Account →');
        showError('register-error', err.message);
      }
    });
  </script>
</body>
</html>
